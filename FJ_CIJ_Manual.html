<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Download Center</title>

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --border: rgba(15, 23, 42, 0.10);
      --text: rgba(15, 23, 42, 0.92);
      --muted: rgba(15, 23, 42, 0.65);
      --primary: #2563eb;
      --primary-soft: rgba(37, 99, 235, 0.12);
      --shadow: rgba(15, 23, 42, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f6f8fb, #eef3f9);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 18px 80px;
    }

    /* 顶部 Banner */
    .hero {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 26px 22px;
      box-shadow: 0 12px 30px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      top: -140px;
      right: -120px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.18), transparent 70%);
    }

    .hero h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .hero p {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 760px;
    }

    /* 工具栏 */
    .toolbar {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.10);
    }

    .search-box input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
    }

    .search-box input::placeholder {
      color: rgba(15, 23, 42, 0.45);
    }

    .select-box {
      min-width: 200px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.10);
      font-size: 14px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    .lang-switch {
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.10);
      font-size: 14px;
      color: var(--text);
      outline: none;
      cursor: pointer;
      font-weight: 700;
    }

    .lang-switch:hover {
      border-color: rgba(37, 99, 235, 0.25);
    }

    /* 标题 */
    .section-title {
      margin-top: 26px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
    }

    .section-title h2 {
      font-size: 16px;
      font-weight: 800;
    }

    .section-title span {
      font-size: 13px;
      color: var(--muted);
    }

    /* 卡片列表（横向排版） */
    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      display: flex;
      gap: 18px;
      padding: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 12px 24px var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
    }

    /* 产品图区域（竖图） */
    .img-box {
      width: 120px;
      min-width: 120px;
      height: 170px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
      border: 1px solid rgba(15, 23, 42, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 右侧信息 */
    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .top-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .model-name {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.2;
    }

    .tag {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid rgba(37, 99, 235, 0.22);
      white-space: nowrap;
      font-weight: 700;
    }

    .desc {
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
      margin-top: 6px;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: rgba(15, 23, 42, 0.75);
    }

    .meta div {
      padding: 7px 10px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    /* 按钮 */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.12);
      color: rgba(15, 23, 42, 0.82);
    }

    .btn-ghost:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.25);
    }

    footer {
      margin-top: 42px;
      text-align: center;
      font-size: 12px;
      color: rgba(15, 23, 42, 0.55);
      line-height: 1.6;
    }

    /* 移动端适配 */
    @media (max-width: 680px) {
      .hero h1 {
        font-size: 18px;
      }

      .card {
        flex-direction: column;
      }

      .img-box {
        width: 100%;
        height: 220px;
      }

      .top-line {
        flex-direction: column;
        align-items: flex-start;
      }

      .btn-row {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="toolbar">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索机型...">
      </div>
      <button class="lang-switch" id="langSwitch">EN</button>
    </div>

    <div class="section-title">
      <h2 id="sectionTitle">所有机型说明书</h2>
      <span id="countText">共 0 个机型</span>
    </div>

    <div class="list" id="manualList"></div>

    <footer id="footer">
      © 2026 CIJ喷印设备说明书下载中心
    </footer>
  </div>

  <script>
    // 语言状态管理
    let currentLang = navigator.language || navigator.userLanguage;
    let isEnglishMode = currentLang.startsWith('en');

    const manuals = [
      {
        model: "A100 喷码机",
        modelEn: "A100 Inkjet Printer",
        size: "12.6MB",
        file: "files/A100_Manual.pdf",
        fileEn: "A100 Inkjet Printer Manual.pdf",
        image: "images/A100.png"
      },
      {
        model: "A200 喷码机",
        modelEn: "A200 Inkjet Printer",
        size: "9.3MB",
        file: "files/A200_Manual.pdf",
        fileEn: "A200 Inkjet Printer Manual.pdf",
        image: "images/A200.png"
      },
      {
        model: "L300 激光机",
        modelEn: "L300 Laser Machine",
        size: "18.2MB",
        file: "files/L300_Manual.pdf",
        fileEn: "L300 Laser Machine Manual.pdf",
        image: "images/L300.png"
      },
      {
        model: "Vision-X 视觉设备",
        modelEn: "Vision-X Vision System",
        size: "22.4MB",
        file: "files/VisionX_Manual.pdf",
        fileEn: "Vision-X Vision System Manual.pdf",
        image: "images/VisionX.png"
      },
      {
        model: "喷头清洗套件",
        modelEn: "Nozzle Cleaning Kit",
        size: "2.6MB",
        file: "files/CleanKit_Manual.pdf",
        fileEn: "Nozzle Cleaning Kit Manual.pdf",
        image: "images/CleanKit.png"
      }
    ];

    const list = document.getElementById("manualList");
    const countText = document.getElementById("countText");

    function renderList() {
      const category = "all";

      const filtered = manuals.filter(item => {
        const matchCategory = category === "all" || item.category === category;
        return matchCategory;
      });

      // 更新页面文本
      document.title = isEnglishMode ? "Manual Download Center" : "说明书下载中心";
      document.getElementById('sectionTitle').textContent = isEnglishMode ? "All Device Manuals" : "所有机型说明书";
      countText.innerText = isEnglishMode ? `Total ${filtered.length} devices` : `共 ${filtered.length} 个机型`;
      document.getElementById('footer').innerHTML = isEnglishMode ? 
        "© 2026 Enterprise Device Manual Download Center<br>Recommended: Chrome / Edge browsers" : 
        "© 2026 企业设备说明书下载中心<br>建议使用 Chrome / Edge 浏览器访问";
      document.getElementById('langSwitch').textContent = isEnglishMode ? "中文" : "EN";
      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.placeholder = isEnglishMode ? "Search models..." : "搜索机型...";
      }

      list.innerHTML = filtered.map(item => `
        <div class="card">
          <div class="img-box">
            <img src="${item.image}" alt="${isEnglishMode ? item.modelEn : item.model}">
          </div>

          <div class="info">
            <div>
              <div class="top-line">
                <div>
                  <div class="model-name">${isEnglishMode ? item.modelEn : item.model}</div>
                  <div class="desc">${item.desc}</div>
                </div>
              </div>

              <div class="meta">
                <div>${isEnglishMode ? "Size: " : "大小："}${item.size}</div>
              </div>
            </div>

            <div class="btn-row">
              <button class="btn btn-primary" onclick="downloadFile('${item.file}')">⬇ ${isEnglishMode ? "Download Manual" : "下载说明书"}</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    // 语言切换功能
    function toggleLanguage() {
      isEnglishMode = !isEnglishMode;
      renderList();
    }

    // 绑定语言切换事件
    document.getElementById('langSwitch').addEventListener('click', toggleLanguage);

    function downloadFile(fileUrl) {
      const a = document.createElement("a");
      a.href = fileUrl;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function previewFile(fileUrl) {
      window.open(fileUrl, "_blank");
    }

    renderList();
  </script>
</body>
</html>
