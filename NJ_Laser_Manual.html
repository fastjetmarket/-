<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>说明书下载中心</title>

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --border: rgba(15, 23, 42, 0.10);
      --text: rgba(15, 23, 42, 0.92);
      --muted: rgba(15, 23, 42, 0.65);
      --primary: #2563eb;
      --primary-soft: rgba(37, 99, 235, 0.12);
      --shadow: rgba(15, 23, 42, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f6f8fb, #eef3f9);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 18px 80px;
    }

    /* 顶部 Banner */
    .hero {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 26px 22px;
      box-shadow: 0 12px 30px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      top: -140px;
      right: -120px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.18), transparent 70%);
    }

    .hero h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .hero p {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 760px;
    }

    /* 工具栏 */
    .toolbar {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.10);
    }

    .search-box input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
    }

    .search-box input::placeholder {
      color: rgba(15, 23, 42, 0.45);
    }

    /* 标题 */
    .section-title {
      margin-top: 0px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
    }

    .section-title h2 {
      font-size: 16px;
      font-weight: 800;
    }

    .section-title span {
      font-size: 13px;
      color: var(--muted);
    }

    /* 卡片列表（横向排版） */
    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      display: flex;
      gap: 18px;
      padding: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 12px 24px var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
    }

    /* 产品图区域（竖图） */
    .img-box {
      width: 352px;
      min-width: 352px;
      height: 198px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
      border: 1px solid rgba(15, 23, 42, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 右侧信息 */
    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .top-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .model-name {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.2;
    }

    .tag {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid rgba(37, 99, 235, 0.22);
      white-space: nowrap;
      font-weight: 700;
    }

    .desc {
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
      margin-top: 6px;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: rgba(15, 23, 42, 0.75);
    }

    .meta div {
      padding: 7px 10px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    /* 按钮 */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.12);
      color: rgba(15, 23, 42, 0.82);
    }

    .btn-ghost:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.25);
    }

    footer {
      margin-top: 42px;
      text-align: center;
      font-size: 12px;
      color: rgba(15, 23, 42, 0.55);
      line-height: 1.6;
    }

    /* 汉堡菜单 */
    .menu-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .menu-btn span {
      width: 100%;
      height: 2px;
      background: #000;
      border-radius: 1px;
    }

    .menu-dropdown {
      position: absolute;
      /* 关键：改成绝对定位，相对于父容器 */
      top: 100%;
      /* 紧贴按钮下方 */
      right: 0;
      /* 右对齐 */
      margin-top: 4px;
      /* 轻微间距，更美观 */
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .12);
      display: none;
      z-index: 998;
      font-weight: 700;
      white-space: nowrap;
      /* 防止文字换行 */
    }

    .menu-dropdown.show {
      display: block;
    }

    .menu-item {
      padding: 12px 20px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #f5f5f5;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    /* 移动端适配 */
    @media (max-width: 680px) {
      .hero h1 {
        font-size: 18px;
      }

      .card {
        flex-direction: column;
      }

      .img-box {
        width: 100%;
        min-width: auto;
        height: 220px;
      }

      .top-line {
        flex-direction: column;
        align-items: flex-start;
      }

      .btn-row {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="section-title">
      <h2>说明书下载中心</h2>
      <div style="position: relative; display: inline-block;">
        <!-- 下拉菜单 -->
        <button class="menu-btn" id="menuBtn">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="menu-dropdown" id="menuDropdown">
          <div class="menu-item" data-category="all" data-en="All Manuals" data-cn="全部说明书">全部说明书</div>
          <!-- <div class="menu-item" data-category="F7000" data-en="F7000 Series" data-cn="F7000系列">F7000系列</div>
          <div class="menu-item" data-category="F8000" data-en="F8000 Series" data-cn="F8000系列">F8000系列</div> -->
          <div class="menu-item lang-item" id="langSwitch">EN</div>
        </div>
      </div>
    </div>

    <div class="list" id="manualList"></div>

    <footer id="footer">
      © 2026 企业设备说明书下载中心
    </footer>
  </div>

  <script>
    // 语言状态管理
    let currentLang = navigator.language || navigator.userLanguage;
    let isEnglishMode = currentLang.startsWith('en');

    // 菜单交互
    const menuBtn = document.getElementById('menuBtn');
    const menuDropdown = document.getElementById('menuDropdown');
    menuBtn.addEventListener('click', e => {
      e.stopPropagation();
      menuDropdown.classList.toggle('show');
    });
    document.addEventListener('click', () => menuDropdown.classList.remove('show'));


    // 中文说明书列表
    const manualsCN = [
      {
        model: "NJ1451F操作说明书",
        category: "NJ1400",
        file: "files/NJ1451F激光机说明书.pdf",
        image: "files/covers/NJ1451F激光机说明书.jpg",
      },
    ];

    // 英文说明书列表
    const manualsEN = [
      {
        model: "NJ1451F Series Manual",
        category: "NJ1400",
        file: "files/NJ1451FLaserUserManual.pdf",
        image: "files/covers/NJ1451F激光机说明书.jpg",
      },
      {
        model: "NJ1405U-T Series Manual",
        category: "NJ1400",
        file: "files/NJ1405U-T Laser Marking System Operation Manual.pdf",
        image: "files/covers/NJ1405U-T Laser Marking System Operation Manual.jpg",
      },
    ];


    const list = document.getElementById("manualList");
    let currentCategory = "all";  // 当前选中分类


    function renderList() {
      // 根据语言选择对应的数据集
      const currentManuals = isEnglishMode ? manualsEN : manualsCN;
      const category = currentCategory;

      const filtered = currentManuals.filter(item => {
        const matchCategory = category === "all" || item.category === category;
        return matchCategory;
      });

      // 更新页面文本
      document.querySelector('.section-title h2').textContent = isEnglishMode ? 'Manual Download Center' : '说明书下载中心';
      document.getElementById('footer').innerHTML = isEnglishMode ?
        "© 2026 Enterprise Device Manual Download Center" :
        "© 2026 企业设备说明书下载中心";

      // 更新下拉菜单文本
      document.querySelectorAll('.menu-item').forEach(item => {
        if (!item.classList.contains('lang-item')) {
          item.textContent = isEnglishMode ? (item.dataset.en || item.textContent) : item.dataset.cn || item.textContent;
        }
      });

      // 更新语言切换按钮文本
      document.getElementById('langSwitch').textContent = isEnglishMode ? '中文' : 'EN';

      list.innerHTML = filtered.map(item => `
        <div class="card">
          <div class="img-box">
            <img src="${item.image}" alt="${item.model}">
          </div>

          <div class="info">
            <div>
              <div class="top-line">
                <div>
                  <div class="model-name">${item.model}</div>
                </div>
                <div class="tag">${item.category}</div>
              </div>
            </div>
            <div class="btn-row">
              <button class="btn btn-primary" onclick="downloadFile('${item.file}')">⬇ ${isEnglishMode ? 'Download Manual' : '下载说明书'}</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    // 语言切换功能
    function toggleLanguage(e) {
      e.stopPropagation(); // 阻止事件冒泡，避免菜单关闭
      isEnglishMode = !isEnglishMode;
      menuDropdown.classList.remove('show'); // 手动关闭菜单
      renderList();
    }

    function downloadFile(fileUrl) {
      const a = document.createElement("a");
      a.href = fileUrl;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function previewFile(fileUrl) {
      window.open(fileUrl, "_blank");
    }

    // 点击菜单选项时切换分类并刷新
    document.querySelectorAll(".menu-item").forEach(item => {
      item.addEventListener("click", function (e) {
        if (this.classList.contains('lang-item')) {
          // 语言切换
          e.stopPropagation();
          isEnglishMode = !isEnglishMode;
          menuDropdown.classList.remove('show');
          renderList();
        } else {
          // 分类切换
          currentCategory = this.dataset.category;
          menuDropdown.classList.remove('show');
          renderList();
        }
      });
    });

    // 监听窗口大小变化，自动切换图片
    window.addEventListener('resize', renderList);

    renderList();
  </script>
</body>

</html>
